<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARM Workforce Roster Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 20px; background-color: #f7fafc; color: #2d3748; }
        .container { max-width: 1400px; margin: 0 auto; background: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); }
        h2 { margin-top: 0; color: #1a202c; border-bottom: 2px solid #edf2f7; padding-bottom: 12px; }
        .control-panel { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; padding: 15px; background: #edf2f7; border-radius: 6px; align-items: center; }
        .search-wrapper { flex: 1; min-width: 300px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { background-color: #3182ce; color: white; padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: background 0.2s; }
        .btn:hover { background-color: #2b6cb0; }
        .btn-download { background-color: #38a169; }
        .btn-download:hover { background-color: #2f855a; }
        .file-upload-btn { position: relative; overflow: hidden; display: inline-block; }
        .file-upload-btn input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .status-msg { margin-left: auto; font-size: 14px; font-weight: bold; color: #4a5568; }
        .table-container { overflow-x: auto; max-height: 550px; border: 1px solid #e2e8f0; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background-color: #2d3748; color: white; padding: 12px 10px; position: sticky; top: 0; z-index: 10; font-weight: 600; }
        td { padding: 6px 8px; border-bottom: 1px solid #edf2f7; background: #ffffff; min-width: 120px; }
        tr:hover td { background-color: #f7fafc; }
        td input { width: 100%; border: 1px solid transparent; padding: 6px; border-radius: 3px; background: transparent; font-size: 13px; box-sizing: border-box; }
        td input:focus { border-color: #3182ce; background: #fff; outline: none; box-shadow: 0 0 0 1px #3182ce; }
        .highlight-match { background-color: #feebc8 !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>ARM Workforce Roster Manager</h2>
    
    <div class="control-panel">
        <div class="search-wrapper">
            <input type="text" id="iqamaSearch" placeholder="🔍 Search by Iqama Number..." oninput="searchIqama()">
        </div>
        
        <div class="file-upload-btn">
            <button class="btn">📤 Upload New CSV</button>
            <input type="file" id="fileSelector" accept=".csv" onchange="importCSV(event)">
        </div>

        <button class="btn btn-download" onclick="exportCSV()">📥 Download Updated CSV</button>
        <span id="status" class="status-msg">Loading data...</span>
    </div>

    <div class="table-container">
        <table id="rosterTable">
            <thead>
                <tr id="tableHeaders"></tr>
            </thead>
            <tbody id="tableRows"></tbody>
        </table>
    </div>
</div>

<script>
    let rawHeaders = [];
    let rosterRecords = [];

    // Auto-fetch data.csv directly from the GitHub repository on page load
    window.addEventListener('DOMContentLoaded', () => {
        fetch('data.csv')
            .then(res => {
                if (!res.ok) throw new Error();
                return res.text();
            })
            .then(csvString => parseData(csvString))
            .catch(() => {
                document.getElementById('status').innerText = "Please upload your ARM CSV file to begin.";
            });
    });

    // Parse CSV Text
    function parseData(csvText) {
        document.getElementById('status').innerText = "Processing records...";
        Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            complete: function(parsed) {
                rawHeaders = parsed.meta.fields;
                rosterRecords = parsed.data;
                renderDynamicTable(rosterRecords);
                document.getElementById('status').innerText = `Loaded ${rosterRecords.length} employees.`;
            }
        });
    }

    // Build the dynamic, editable grid
    function renderDynamicTable(records) {
        const headerContainer = document.getElementById('tableHeaders');
        const rowContainer = document.getElementById('tableRows');
        
        headerContainer.innerHTML = '';
        rowContainer.innerHTML = '';

        if (!rawHeaders.length) return;

        // Populate headers
        rawHeaders.forEach(col => {
            const th = document.createElement('th');
            th.innerText = col;
            headerContainer.appendChild(th);
        });

        // Populate editable rows
        records.forEach((record, index) => {
            const tr = document.createElement('tr');
            
            rawHeaders.forEach(col => {
                const td = document.createElement('td');
                const cellInput = document.createElement('input');
                cellInput.type = "text";
                cellInput.value = record[col] || '';
                
                // Keep track of any typing edits on the fly
                cellInput.addEventListener('change', (e) => {
                    const trackingIndex = rosterRecords.indexOf(record);
                    if (trackingIndex !== -1) {
                        rosterRecords[trackingIndex][col] = e.target.value;
                        document.getElementById('status').innerText = "Changes saved to memory! Ready to download.";
                    }
                });

                td.appendChild(cellInput);
                tr.appendChild(td);
            });
            rowContainer.appendChild(tr);
        });
    }

    // Target the specific Iqama column for super-fast search
    function searchIqama() {
        const query = document.getElementById('iqamaSearch').value.trim();
        const rows = document.querySelectorAll('#tableRows tr');
        
        // Match both 'Iqama No' and 'Iqama Number' naming conventions
        const iqamaKey = rawHeaders.find(key => key.toLowerCase().includes('iqama'));
        const iqamaColIndex = rawHeaders.indexOf(iqamaKey);

        rows.forEach(row => {
            if (iqamaColIndex === -1) return;
            
            const fields = row.getElementsByTagName('input');
            const targetField = fields[iqamaColIndex];
            const iqamaValue = targetField.value.trim();

            if (iqamaValue.includes(query)) {
                row.style.display = "";
                if (query !== "") {
                    targetField.classList.add('highlight-match');
                } else {
                    targetField.classList.remove('highlight-match');
                }
            } else {
                row.style.display = "none";
                targetField.classList.remove('highlight-match');
            }
        });
    }

    // Local manual file import
    function importCSV(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
            parseData(evt.target.result);
        };
        reader.readAsText(file);
    }

    // Package current edited state and trigger user download
    function exportCSV() {
        if (!rosterRecords.length) {
            alert("No data available to download.");
            return;
        }
        const csvOutput = Papa.unparse({
            fields: rawHeaders,
            data: rosterRecords
        });
        
        const blob = new Blob([csvOutput], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", "Updated_ARM_Workforce_Roster.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>

</body>
</html>
